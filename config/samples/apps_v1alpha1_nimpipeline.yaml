apiVersion: apps.nvidia.com/v1alpha1
kind: NemoPlatform
metadata:
  labels:
    app.kubernetes.io/name: k8s-nim-operator
    app.kubernetes.io/managed-by: k8s-nim-operator
  name: nemo-services
spec:
  customizer:
    - name: nemo-customizer
      enabled: true
      config:
        name: customizer-configmap
  datastore:
    - name: nemo-datastore
      enabled: true
      config:
        name: datastore-configmap
  entitystore:
    - name: nemo-entitystore
      enabled: true
      config:
        name: entitystore-configmap
  guardrails:
    - name: nemo-guardrails
      enabled: true
      config:
        name: guardrails-configmap
  evaluator:
    - name: nemo-evaluator
      enabled: true
      config:
        name: evaluator-configmap
